name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  FIRMWARE_NAME: cardputer_adv_remote_win_merged.bin
  EXE_NAME: cardputer_adv_remote_win.exe
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest

    steps:
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --verify-tag \
              --title "$RELEASE_TAG" --notes "Release $RELEASE_TAG"
          fi

  firmware:
    name: Firmware release asset
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e cardputer_adv

      - name: Merge firmware bin
        run: |
          rm -rf release
          mkdir -p release
          python ~/.platformio/packages/tool-esptoolpy/esptool.py --chip esp32s3 merge_bin \
            --output "release/$FIRMWARE_NAME" \
            --flash_mode keep --flash_freq keep --flash_size keep \
            0x0 .pio/build/cardputer_adv/bootloader.bin \
            0x8000 .pio/build/cardputer_adv/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/cardputer_adv/firmware.bin
          cd release
          sha256sum "$FIRMWARE_NAME" > "$FIRMWARE_NAME.sha256"

      - name: Upload firmware release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "release/$FIRMWARE_NAME" \
            "release/$FIRMWARE_NAME.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  windows-gui:
    name: Windows GUI release asset
    runs-on: windows-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pyinstaller -r scripts\requirements-windows.txt

      - name: Build GUI exe
        run: >
          python -m PyInstaller
          --clean
          --noconfirm
          --onefile
          --windowed
          --uac-admin
          --name cardputer_adv_remote_win
          scripts\windows_remote_gui.py

      - name: Prepare GUI release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "dist\$env:EXE_NAME" "release\$env:EXE_NAME" -Force
          $hash = (Get-FileHash "release\$env:EXE_NAME" -Algorithm SHA256).Hash.ToLower()
          "$hash  $env:EXE_NAME" | Set-Content -NoNewline "release\$env:EXE_NAME.sha256"

      - name: Upload GUI release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$env:RELEASE_TAG" `
            "release\$env:EXE_NAME" `
            "release\$env:EXE_NAME.sha256" `
            --repo "$env:GITHUB_REPOSITORY" `
            --clobber
